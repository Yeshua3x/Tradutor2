<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tradutor com JSON Externo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        #resultado, #palavras-relevantes {
            margin-top: 10px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>Tradutor de Inglês para Português</h1>
    <input type="text" id="texto-input" placeholder="Digite uma frase em inglês" />
    <button id="traduzir-btn">Traduzir</button>
    
    <div id="resultado"></div>
    <div id="palavras-relevantes"></div>

    <script>
        let traducoes;

        // Carregar o JSON de traduções
        fetch('translations.json')
            .then(response => response.json())
            .then(data => {
                traducoes = data;
            });

        document.getElementById('traduzir-btn').addEventListener('click', function() {
            const frase = document.getElementById('texto-input').value.toLowerCase();
            const palavras = frase.split(' ');
            let traducao = [];
            let palavrasRelevantes = [];

            palavras.forEach(palavra => {
                if (traducoes[palavra]) {
                    traducao.push(traducoes[palavra].translation);
                    palavrasRelevantes = palavrasRelevantes.concat(traducoes[palavra].relevant);
                }
            });

            document.getElementById('resultado').innerText = traducao.length > 0 ? 
                `Tradução: ${traducao.join(' ')}` : "Nenhuma tradução encontrada.";
            
            document.getElementById('palavras-relevantes').innerText = palavrasRelevantes.length > 0 ? 
                `Palavras relevantes: ${[...new Set(palavrasRelevantes)].join(', ')}` : "";
        });
    </script>
</body>
</html>
